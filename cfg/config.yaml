# =================================================================
# ARES (AI Research Ensemble System)
# =================================================================
# -----------------------------------------------------------------

algorithm: ares


problem:
  problem_name: tsp
  description: "tsp"
  func_name: "heuristics_v2"
  obj_type: "min"

num_eval_workers: 8

init_pop_size: 30

pop_size: 9

max_fe: 90

timeout: 200

eval_runs: 3

meta_reflection_cycle_period: 4

radical_exploration_trigger: 1

radical_exploration_duration: 2

stagnation_threshold: 0.001 # 0.1%


llm_roles:

  theorist:
    _target_: utils.llm_client.openai.OpenAIClient
    model: "deepseek-chat"
    api_key:
    temperature: 0.9
    base_url: https://api.deepseek.com
    max_tokens: 64000


  critic:
    _target_: utils.llm_client.openai.OpenAIClient
    model: "deepseek-chat"
    api_key:
    temperature: 0
    base_url: https://api.deepseek.com
    max_tokens: 64000


  experimenter:
    _target_: utils.llm_client.openai.OpenAIClient
    model: "deepseek-chat"
    api_key:
    temperature: 0.9
    base_url: https://api.deepseek.com
    max_tokens: 64000



